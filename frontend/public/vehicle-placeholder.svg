<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vehicle placeholder</title>
  <desc id="desc">Simple placeholder image representing a car</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="200" fill="url(#bg)" rx="16" />
  <g transform="translate(60 80)" fill="none" stroke="#4b5563" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="40" y="20" width="180" height="50" rx="10" />
    <path d="M60 20 L110 0 L190 0 L220 20" />
    <circle cx="80" cy="80" r="16" fill="#f9fafb" />
    <circle cx="220" cy="80" r="16" fill="#f9fafb" />
    <circle cx="80" cy="80" r="8" fill="#9ca3af" />
    <circle cx="220" cy="80" r="8" fill="#9ca3af" />
  </g>
  <text x="200" y="180" text-anchor="middle" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">
    Vehicle image
  </text>
</svg>

